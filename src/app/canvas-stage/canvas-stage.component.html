<section
  class="canvas-stage"
  [class.canvas-stage-fit]="isFitCanvasView()"
  [class.canvas-stage-scaled]="!isFitCanvasView()"
>
  <svg
    #scene
    class="scene"
    [class.scene-borderless]="!(state.project().pageSetup?.showPageBorder ?? true)"
    [attr.viewBox]="'0 0 ' + state.project().canvas.width + ' ' + state.project().canvas.height"
    [attr.width]="state.project().canvas.width + 'mm'"
    [attr.height]="state.project().canvas.height + 'mm'"
    [style.width.mm]="scaledCanvasWidthMm()"
    [style.height.mm]="scaledCanvasHeightMm()"
    (pointermove)="onSvgPointerMove($event)"
    (pointerup)="onSvgPointerUp()"
    (pointerleave)="onSvgPointerUp()"
    (pointerdown)="onSvgPointerDown($event)"
  >
    <rect
      [attr.width]="state.project().canvas.width"
      [attr.height]="state.project().canvas.height"
      [attr.fill]="state.project().canvas.backgroundColor ?? '#ffffff'"
    />
    @if (showGrid()) {
      <rect
        class="editor-grid"
        data-editor-helper="true"
        [attr.width]="state.project().canvas.width"
        [attr.height]="state.project().canvas.height"
        [attr.fill]="'url(#' + gridPatternId() + ')'"
      />
    }
    @if (state.mode() === 'edit') {
      <rect
        class="page-margin-guide"
        data-editor-helper="true"
        [attr.x]="state.project().pageSetup?.marginLeft ?? 0"
        [attr.y]="state.project().pageSetup?.marginTop ?? 0"
        [attr.width]="
          state.project().canvas.width -
          (state.project().pageSetup?.marginLeft ?? 0) -
          (state.project().pageSetup?.marginRight ?? 0)
        "
        [attr.height]="
          state.project().canvas.height -
          (state.project().pageSetup?.marginTop ?? 0) -
          (state.project().pageSetup?.marginBottom ?? 0)
        "
        fill="none"
      />
    }

    <defs>
      <pattern
        [attr.id]="gridPatternId()"
        patternUnits="userSpaceOnUse"
        [attr.width]="normalizedGridSize()"
        [attr.height]="normalizedGridSize()"
      >
        <path class="editor-grid-line" [attr.d]="gridPath()" />
      </pattern>

      @for (layer of state.visibleLayers(); track layer.id) {
        @for (element of allElements(layer.elements); track element.id) {
          @if (usesAbsoluteBackground(element)) {
            <clipPath [attr.id]="backgroundClipPathId(element)" clipPathUnits="userSpaceOnUse">
              @switch (element.type) {
                @case ('circle') {
                  <circle cx="0" cy="0" [attr.r]="element.radius" />
                }
                @default {
                  <path [attr.d]="elementPath(element)" />
                }
              }
            </clipPath>
          }
        }
      }

      @for (layer of state.visibleLayers(); track layer.id) {
        @for (segment of renderSegments(layer); track segment.id) {
          @if (segment.subtractiveElements.length > 0) {
            <mask [attr.id]="segmentMaskId(segment)" maskUnits="userSpaceOnUse">
              <rect
                x="0"
                y="0"
                [attr.width]="state.project().canvas.width"
                [attr.height]="state.project().canvas.height"
                fill="#ffffff"
              />
              @for (element of segment.subtractiveElements; track element.id) {
                @switch (element.type) {
                  @case ('circle') {
                    <circle
                      cx="0"
                      cy="0"
                      [attr.r]="element.radius"
                      [attr.transform]="renderTransform(element)"
                      fill="#000000"
                    />
                  }
                  @default {
                    <path
                      [attr.d]="elementPath(element)"
                      [attr.transform]="renderTransform(element)"
                      fill="#000000"
                    />
                  }
                }
              }
            </mask>
            <mask [attr.id]="segmentAdditiveMaskId(segment)" maskUnits="userSpaceOnUse">
              <rect
                x="0"
                y="0"
                [attr.width]="state.project().canvas.width"
                [attr.height]="state.project().canvas.height"
                fill="#000000"
              />
              @for (element of segment.elements; track element.id) {
                <g [attr.transform]="renderTransform(element)">
                  @switch (element.type) {
                    @case ('rectangle') {
                      <path [attr.d]="elementPath(element)" fill="#ffffff" />
                    }
                    @case ('circle') {
                      <circle cx="0" cy="0" [attr.r]="element.radius" fill="#ffffff" />
                    }
                    @case ('triangle') {
                      <path [attr.d]="elementPath(element)" fill="#ffffff" />
                    }
                    @case ('polygon') {
                      <path [attr.d]="elementPath(element)" fill="#ffffff" />
                    }
                    @case ('gear') {
                      <path [attr.d]="elementPath(element)" fill="#ffffff" />
                      <circle cx="0" cy="0" [attr.r]="element.centerDotRadius" fill="#ffffff" />
                      @for (label of element.labels ?? []; track label.id) {
                        <text
                          [attr.x]="
                            math.cos((label.angle * math.PI) / 180) *
                            (element.discRadius - label.offsetFromEdge)
                          "
                          [attr.y]="
                            math.sin((label.angle * math.PI) / 180) *
                            (element.discRadius - label.offsetFromEdge)
                          "
                          [attr.transform]="labelTransform(element, label)"
                          [attr.text-anchor]="label.align"
                          [attr.font-size]="label.fontSize"
                          [attr.font-family]="label.fontFamily"
                          [attr.font-weight]="label.fontWeight"
                          fill="#ffffff"
                        >
                          {{ label.text }}
                        </text>
                      }
                    }
                    @case ('text') {
                      <text
                        x="0"
                        y="0"
                        [attr.text-anchor]="element.align"
                        [attr.font-size]="element.fontSize"
                        [attr.font-family]="element.fontFamily"
                        [attr.font-weight]="element.fontWeight"
                        fill="#ffffff"
                      >
                        {{ element.text }}
                      </text>
                    }
                  }
                </g>
              }
            </mask>
          }
        }
      }
    </defs>

    @for (layer of state.visibleLayers(); track layer.id) {
      <g [attr.opacity]="layer.opacity" [attr.data-export-layer-id]="layer.id">
        @for (segment of renderSegments(layer); track segment.id) {
          <g
            [attr.mask]="
              segment.subtractiveElements.length > 0
                ? 'url(#' + segmentMaskId(segment) + ')'
                : null
            "
          >
            @for (element of segment.elements; track element.id) {
              <g
                class="element"
                [class.selectable]="state.mode() === 'edit' && !layer.locked && !element.locked"
                [attr.transform]="renderTransform(element)"
                [attr.opacity]="element.opacity ?? 1"
                (pointerdown)="
                  state.mode() === 'view'
                    ? onViewElementPointerDown($event, element)
                    : onElementPointerDown($event, element, layer)
                "
              >
                @switch (element.type) {
                  @case ('rectangle') {
                    <path
                      [attr.d]="elementPath(element)"
                      [attr.fill]="shapeFill(element)"
                      [attr.stroke]="usesAbsoluteBackground(element) ? null : element.stroke"
                      [attr.stroke-width]="usesAbsoluteBackground(element) ? null : element.strokeWidth"
                    />
                    @if (usesAbsoluteBackground(element)) {
                      <g [attr.clip-path]="'url(#' + backgroundClipPathId(element) + ')'">
                        <image
                          [attr.x]="absoluteBackgroundImageX(element)"
                          [attr.y]="absoluteBackgroundImageY(element)"
                          [attr.width]="absoluteBackgroundImageWidth(element)"
                          [attr.height]="absoluteBackgroundImageHeight(element)"
                          [attr.preserveAspectRatio]="absoluteBackgroundPreserveAspectRatio(element)"
                          [attr.href]="element.backgroundImage"
                        />
                      </g>
                      <path
                        [attr.d]="elementPath(element)"
                        fill="none"
                        [attr.stroke]="element.stroke"
                        [attr.stroke-width]="element.strokeWidth"
                      />
                    }
                  }
                  @case ('circle') {
                    <circle
                      cx="0"
                      cy="0"
                      [attr.r]="element.radius"
                      [attr.fill]="shapeFill(element)"
                      [attr.stroke]="usesAbsoluteBackground(element) ? null : element.stroke"
                      [attr.stroke-width]="usesAbsoluteBackground(element) ? null : element.strokeWidth"
                    />
                    @if (usesAbsoluteBackground(element)) {
                      <g [attr.clip-path]="'url(#' + backgroundClipPathId(element) + ')'">
                        <image
                          [attr.x]="absoluteBackgroundImageX(element)"
                          [attr.y]="absoluteBackgroundImageY(element)"
                          [attr.width]="absoluteBackgroundImageWidth(element)"
                          [attr.height]="absoluteBackgroundImageHeight(element)"
                          [attr.preserveAspectRatio]="absoluteBackgroundPreserveAspectRatio(element)"
                          [attr.href]="element.backgroundImage"
                        />
                      </g>
                      <circle
                        cx="0"
                        cy="0"
                        [attr.r]="element.radius"
                        fill="none"
                        [attr.stroke]="element.stroke"
                        [attr.stroke-width]="element.strokeWidth"
                      />
                    }
                  }
                  @case ('triangle') {
                    <path
                      [attr.d]="elementPath(element)"
                      [attr.fill]="shapeFill(element)"
                      [attr.stroke]="usesAbsoluteBackground(element) ? null : element.stroke"
                      [attr.stroke-width]="usesAbsoluteBackground(element) ? null : element.strokeWidth"
                    />
                    @if (usesAbsoluteBackground(element)) {
                      <g [attr.clip-path]="'url(#' + backgroundClipPathId(element) + ')'">
                        <image
                          [attr.x]="absoluteBackgroundImageX(element)"
                          [attr.y]="absoluteBackgroundImageY(element)"
                          [attr.width]="absoluteBackgroundImageWidth(element)"
                          [attr.height]="absoluteBackgroundImageHeight(element)"
                          [attr.preserveAspectRatio]="absoluteBackgroundPreserveAspectRatio(element)"
                          [attr.href]="element.backgroundImage"
                        />
                      </g>
                      <path
                        [attr.d]="elementPath(element)"
                        fill="none"
                        [attr.stroke]="element.stroke"
                        [attr.stroke-width]="element.strokeWidth"
                      />
                    }
                  }
                  @case ('polygon') {
                    <path
                      [attr.d]="elementPath(element)"
                      [attr.fill]="shapeFill(element)"
                      [attr.stroke]="usesAbsoluteBackground(element) ? null : element.stroke"
                      [attr.stroke-width]="usesAbsoluteBackground(element) ? null : element.strokeWidth"
                    />
                    @if (usesAbsoluteBackground(element)) {
                      <g [attr.clip-path]="'url(#' + backgroundClipPathId(element) + ')'">
                        <image
                          [attr.x]="absoluteBackgroundImageX(element)"
                          [attr.y]="absoluteBackgroundImageY(element)"
                          [attr.width]="absoluteBackgroundImageWidth(element)"
                          [attr.height]="absoluteBackgroundImageHeight(element)"
                          [attr.preserveAspectRatio]="absoluteBackgroundPreserveAspectRatio(element)"
                          [attr.href]="element.backgroundImage"
                        />
                      </g>
                      <path
                        [attr.d]="elementPath(element)"
                        fill="none"
                        [attr.stroke]="element.stroke"
                        [attr.stroke-width]="element.strokeWidth"
                      />
                    }
                  }
                  @case ('gear') {
                    <path
                      [attr.d]="elementPath(element)"
                      [attr.fill]="shapeFill(element)"
                      [attr.stroke]="usesAbsoluteBackground(element) ? null : element.stroke"
                      [attr.stroke-width]="usesAbsoluteBackground(element) ? null : element.strokeWidth"
                    />
                    @if (usesAbsoluteBackground(element)) {
                      <g [attr.clip-path]="'url(#' + backgroundClipPathId(element) + ')'">
                        <image
                          [attr.x]="absoluteBackgroundImageX(element)"
                          [attr.y]="absoluteBackgroundImageY(element)"
                          [attr.width]="absoluteBackgroundImageWidth(element)"
                          [attr.height]="absoluteBackgroundImageHeight(element)"
                          [attr.preserveAspectRatio]="absoluteBackgroundPreserveAspectRatio(element)"
                          [attr.href]="element.backgroundImage"
                        />
                      </g>
                      <path
                        [attr.d]="elementPath(element)"
                        fill="none"
                        [attr.stroke]="element.stroke"
                        [attr.stroke-width]="element.strokeWidth"
                      />
                    }
                    <circle
                      cx="0"
                      cy="0"
                      [attr.r]="element.centerDotRadius"
                      [attr.fill]="element.centerDotFill"
                      [attr.stroke]="element.centerDotStroke"
                      [attr.stroke-width]="element.centerDotStrokeWidth"
                    />
                    @for (label of element.labels ?? []; track label.id) {
                      <text
                        [attr.x]="
                          math.cos((label.angle * math.PI) / 180) *
                          (element.discRadius - label.offsetFromEdge)
                        "
                        [attr.y]="
                          math.sin((label.angle * math.PI) / 180) *
                          (element.discRadius - label.offsetFromEdge)
                        "
                        [attr.transform]="labelTransform(element, label)"
                        [attr.text-anchor]="label.align"
                        dominant-baseline="middle"
                        [attr.font-size]="label.fontSize"
                        [attr.font-family]="label.fontFamily"
                        [attr.font-weight]="label.fontWeight"
                        [attr.fill]="label.fill"
                      >
                        {{ label.text }}
                      </text>
                    }
                  }
                  @case ('text') {
                    <text
                      x="0"
                      y="0"
                      [attr.text-anchor]="element.align"
                      [attr.font-size]="element.fontSize"
                      [attr.font-family]="element.fontFamily"
                      [attr.font-weight]="element.fontWeight"
                      [attr.fill]="element.fill"
                    >
                      {{ element.text }}
                    </text>
                  }
                }
              </g>
            }
          </g>
          @if (segment.subtractiveElements.length > 0) {
            <g [attr.mask]="'url(#' + segmentAdditiveMaskId(segment) + ')'">
              @for (element of segment.subtractiveElements; track element.id) {
                @switch (element.type) {
                  @case ('circle') {
                    <circle
                      class="cutout-stroke"
                      cx="0"
                      cy="0"
                      [attr.r]="element.radius"
                      [attr.transform]="renderTransform(element)"
                      fill="none"
                      [attr.stroke]="shapeStroke(element)"
                      [attr.stroke-width]="shapeStrokeWidth(element)"
                    />
                  }
                  @default {
                    <path
                      class="cutout-stroke"
                      [attr.d]="elementPath(element)"
                      [attr.transform]="renderTransform(element)"
                      fill="none"
                      [attr.stroke]="shapeStroke(element)"
                      [attr.stroke-width]="shapeStrokeWidth(element)"
                    />
                  }
                }
              }
            </g>
          }
        }
      </g>

      @if (state.mode() === 'edit') {
        <g data-editor-helper="true">
          @for (element of allElements(layer.elements); track element.id) {
            @if (isSubtractiveVisible(element)) {
              @switch (element.type) {
                @case ('circle') {
                  <circle
                    class="subtractive-outline"
                    [class.selected-outline]="isSelected(element)"
                    cx="0"
                    cy="0"
                    [attr.r]="element.radius"
                    [style.stroke]="isSelected(element) ? appSettings.selectionOutlineColor() : null"
                    [style.stroke-width]="isSelected(element) ? selectionOutlineThickness() : null"
                    [attr.transform]="renderTransform(element)"
                    (pointerdown)="onElementPointerDown($event, element, layer)"
                  />
                }
                @default {
                  <path
                    class="subtractive-outline"
                    [class.selected-outline]="isSelected(element)"
                    [attr.d]="elementPath(element)"
                    [style.stroke]="isSelected(element) ? appSettings.selectionOutlineColor() : null"
                    [style.stroke-width]="isSelected(element) ? selectionOutlineThickness() : null"
                    [attr.transform]="renderTransform(element)"
                    (pointerdown)="onElementPointerDown($event, element, layer)"
                  />
                }
              }
            }
          }
        </g>
      }
    }

    @if (state.mode() === 'edit') {
      <g data-editor-helper="true">
        @for (layer of state.visibleLayers(); track layer.id) {
          @for (element of allElements(layer.elements); track element.id) {
            @if (isSelected(element) && !isGroup(element)) {
              <g class="selection-box-overlay" [attr.transform]="selectionBoxTransform(element)">
                <rect
                  class="selection-box-outline"
                  x="0"
                  y="0"
                  [attr.width]="selectionBox(element).width"
                  [attr.height]="selectionBox(element).height"
                  [style.stroke]="appSettings.selectionOutlineColor()"
                  [style.stroke-width]="selectionOutlineThickness()"
                />
              </g>
              @if (isShape(element)) {
                <g class="resize-overlay" [attr.transform]="selectionBoxTransform(element)">
                  <rect
                    class="resize-outline"
                    x="0"
                    y="0"
                    [attr.width]="selectionBox(element).width"
                    [attr.height]="selectionBox(element).height"
                    [style.stroke]="appSettings.selectionOutlineColor()"
                    [style.stroke-width]="selectionOutlineThickness()"
                  />
                  @for (handle of resizeHandles; track handle) {
                    <rect
                      class="resize-handle"
                      [attr.width]="selectionHandleSize()"
                      [attr.height]="selectionHandleSize()"
                      [attr.x]="resizeHandleX(selectionBox(element), handle) - resizeHandleOffset()"
                      [attr.y]="resizeHandleY(selectionBox(element), handle) - resizeHandleOffset()"
                      [style.stroke]="appSettings.selectionOutlineColor()"
                      [style.stroke-width]="selectionOutlineThickness()"
                      [style.cursor]="resizeCursor(handle)"
                      (pointerdown)="onShapeResizePointerDown($event, element, handle)"
                    />
                  }
                </g>
              }
            }
          }
        }
      </g>
    }

    @if (state.mode() === 'edit' || state.mode() === 'view') {
      <g data-interaction-guides="true">
        @for (layer of state.visibleLayers(); track layer.id) {
          @for (element of visibleShapeElements(layer.elements); track element.id) {
            @for (interaction of element.interactions ?? []; track interaction.id) {
              @if (interaction.visible) {
                @switch (interaction.type) {
                  @case ('rotation') {
                    <circle
                      class="interaction-point"
                      [class.interaction-point-editable]="state.mode() === 'edit'"
                      [attr.cx]="interactionPointToWorld(element, interaction, 'pivot').x"
                      [attr.cy]="interactionPointToWorld(element, interaction, 'pivot').y"
                      r="1.6"
                      (pointerdown)="
                        onInteractionPointPointerDown($event, element, interaction, 'pivot')
                      "
                    />
                  }
                  @case ('slide') {
                    <line
                      class="interaction-guide"
                      [attr.x1]="interactionPointToWorld(element, interaction, 'start').x"
                      [attr.y1]="interactionPointToWorld(element, interaction, 'start').y"
                      [attr.x2]="interactionPointToWorld(element, interaction, 'end').x"
                      [attr.y2]="interactionPointToWorld(element, interaction, 'end').y"
                    />
                    <circle
                      class="interaction-point"
                      [class.interaction-point-editable]="state.mode() === 'edit'"
                      [attr.cx]="interactionPointToWorld(element, interaction, 'start').x"
                      [attr.cy]="interactionPointToWorld(element, interaction, 'start').y"
                      r="1.35"
                      (pointerdown)="
                        onInteractionPointPointerDown($event, element, interaction, 'start')
                      "
                    />
                    <circle
                      class="interaction-point"
                      [class.interaction-point-editable]="state.mode() === 'edit'"
                      [attr.cx]="interactionPointToWorld(element, interaction, 'end').x"
                      [attr.cy]="interactionPointToWorld(element, interaction, 'end').y"
                      r="1.35"
                      (pointerdown)="
                        onInteractionPointPointerDown($event, element, interaction, 'end')
                      "
                    />
                  }
                }
              }
            }
          }
        }
      </g>
    }

    @if (state.project().pageSetup?.showPageBorder ?? true) {
      <rect
        class="page-border"
        x="0"
        y="0"
        [attr.width]="state.project().canvas.width"
        [attr.height]="state.project().canvas.height"
        fill="none"
        stroke="#2f3a45"
        stroke-width="0.7"
      />
    }
  </svg>
</section>
